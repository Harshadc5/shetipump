server {
    listen 80;
    listen [::]:80;
    server_name shetipump.mitalienterprises.in;

    # 1. Serve the React Frontend
    root /var/www/shetipump/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy Supabase API Gateway (Kong)
    # This ensures HTTPS for your API requests, avoiding "Mixed Content" errors
    location /supabase/ {
        # Strip the /supabase prefix before sending to Kong
        rewrite ^/supabase/(.*)$ /$1 break;
        proxy_pass http://localhost:8000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
